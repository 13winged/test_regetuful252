version: '3.8'

services:
  # ==========================================
  # PostgreSQL Database
  # ==========================================
  postgres:
    image: postgres:15-alpine
    container_name: my-app-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
    # Безопасность: Биндим только на localhost, если нужен доступ с хоста
    # Или вообще убираем ports - контейнеры общаются по сети
    ports:
      - "127.0.0.1:5432:5432"  # Только localhost!
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app-network

  # ==========================================
  # Redis Cache
  # ==========================================
  redis:
    image: redis:7-alpine
    container_name: my-app-redis
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    # Безопасность: Биндим только на localhost
    ports:
      - "127.0.0.1:6379:6379"  # Только localhost!
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app-network

  # ==========================================
  # Web Application
  # ==========================================
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: my-app-web
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_HOST: postgres
      REDIS_HOST: redis
      REDIS_PORT: ${REDIS_PORT}
    # Порт 8000 тоже лучше биндить на localhost, если не нужен прямой доступ
    # Nginx будет обращаться к нему через localhost
    ports:
      - "127.0.0.1:8000:8000"  # Только localhost!
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - app-network

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  app-network:
    driver: bridge
