name: CI/CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  lint:
    name: 📝 Code Linting
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install linter
        run: pip install flake8

      - name: Run linter
        run: flake8 app/ --ignore=E501,W503 --max-line-length=120

  test:
    name: 🧪 Run Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest httpx

      - name: Run tests
        run: |
          # Создаем тесты (если нет)
          mkdir -p tests
          cat > tests/test_main.py << 'TESTEOF'
          import pytest
          from fastapi.testclient import TestClient
          from app.main import app

          client = TestClient(app)

          def test_health():
              response = client.get("/health")
              assert response.status_code == 200
              assert response.json() == {"status": "alive"}

          def test_root():
              response = client.get("/")
              assert response.status_code == 200
              data = response.json()
              assert data["status"] == "success"
              assert "redis_hits" in data
              assert "postgres_records" in data
          TESTEOF

          pytest tests/ -v

  build:
    name: 🐳 Build Docker Image
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          push: false
          load: true
          tags: my-app:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Test Docker image
        run: |
          docker run -d --name test-app -p 8080:8000 my-app:latest
          sleep 5
          curl -f http://localhost:8080/health || exit 1
          docker stop test-app
          docker rm test-app

  deploy:
    name: 🚀 Deploy via Ansible
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up SSH Agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Install Ansible
        run: |
          sudo apt-get update
          sudo apt-get install -y ansible sshpass

      - name: Add Server to Known Hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -p 2222 -H 91.207.183.252 >> ~/.ssh/known_hosts
          ssh-keyscan -p 2222 -H hissihyss2.com >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Test SSH Connection
        run: |
          ssh -p 2222 -o StrictHostKeyChecking=accept-new deployer@91.207.183.252 "echo 'SSH connection successful'"

      - name: Run Ansible Playbook
        run: |
          cd ansible-deploy
          ansible-playbook -i inventory.ini playbook.yml -v

      - name: Verify Deployment
        run: |
          sleep 10
          curl -f https://hissihyss2.com/health || exit 1
          curl -f https://hissihyss2.com/ || exit 1
          echo "✅ Deployment verified successfully!"
